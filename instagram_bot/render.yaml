services:
  - type: pserv
    runtime: node
    name: otbasy-instabot-model
    rootDir: "instabot fin"
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build -w model-server
    startCommand: npm start -w model-server
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBED_MODEL
        value: text-embedding-3-small
      - key: GENERATE_TIMEOUT_MS
        value: 90000
      - key: MAX_TOKENS
        value: 700
      - key: TEMPERATURE
        value: 0.3
      - key: KNOWLEDGE_PATH
        value: model-server/knowledge.md
      - key: DATA_DIR
        value: /var/data
      - key: RAG_TOP_K
        value: 6
      - key: RAG_CHUNK_SIZE
        value: 1400
      - key: RAG_CHUNK_OVERLAP
        value: 200
    disk:
      name: model-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    runtime: node
    name: otbasy-instabot-edge
    rootDir: "instabot fin"
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build -w edge
    startCommand: npm start -w edge
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: IG_USER_ID
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: IG_GRAPH_HOST
        value: https://graph.instagram.com
      - key: MODEL_SERVER_URL
        fromService:
          type: pserv
          name: otbasy-instabot-model
          property: hostport
      - key: LLM_TIMEOUT_MS
        value: 100000
      - key: AUTO_REPLY_ENABLED
        value: true
      - key: DATA_DIR
        value: /var/data
      - key: AUDIT_RETENTION_DAYS
        value: 90
      - key: IG_TOKEN_REFRESH_DAYS
        value: 7
    disk:
      name: edge-data
      mountPath: /var/data
      sizeGB: 1
